<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词记忆网站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .card {
            transition: all 0.3s ease;
            border-radius: 16px;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .btn {
            transition: all 0.2s ease;
            border-radius: 12px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .word-card {
            transition: all 0.5s ease;
        }
        .word-card.fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .nav-btn {
            transition: all 0.3s ease;
        }
        .nav-btn.active {
            position: relative;
        }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background-color: white;
            border-radius: 0 0 8px 8px;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- 头部 -->
    <header class="bg-blue-600 text-white py-6">
        <div class="container mx-auto px-4">
            <h1 class="text-3xl font-bold text-center">单词记忆助手</h1>
            <p class="text-center mt-2">为考研学习者设计的单词记忆工具</p>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 导航标签 -->
        <div class="flex justify-center mb-8">
            <div class="inline-flex rounded-lg shadow-md overflow-hidden" role="group">
                <button type="button" id="nav-input" class="nav-btn px-8 py-3 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:z-10 focus:ring-2 focus:ring-blue-300">
                    输入单词
                </button>
                <button type="button" id="nav-study" class="nav-btn px-8 py-3 text-sm font-medium text-gray-900 bg-white border-t border-b border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-2 focus:ring-blue-300">
                    开始学习
                </button>
                <button type="button" id="nav-list" class="nav-btn px-8 py-3 text-sm font-medium text-gray-900 bg-white border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-2 focus:ring-blue-300">
                    单词列表
                </button>
            </div>
        </div>

        <!-- 输入单词界面 -->
        <section id="input-section" class="card bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4 text-center text-gray-800">添加新单词</h2>
            <form id="word-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="english" class="block text-sm font-medium text-gray-700 mb-1">英文</label>
                        <input type="text" id="english" name="english" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="输入英文单词" required>
                    </div>
                    <div>
                        <label for="chinese" class="block text-sm font-medium text-gray-700 mb-1">中文</label>
                        <input type="text" id="chinese" name="chinese" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="输入中文含义" required>
                    </div>
                </div>
                <div class="flex justify-center">
                    <button type="submit" class="btn px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 focus:ring-2 focus:ring-blue-300">
                        添加单词
                    </button>
                </div>
            </form>
            <div id="message" class="mt-4 text-center text-green-600 hidden"></div>
        </section>

        <!-- 学习单词界面 -->
        <section id="study-section" class="card bg-white rounded-xl shadow-md p-8 mb-8 hidden">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-800">单词学习</h2>
                <p id="word-count" class="text-gray-600 mt-2">第 1 个 / 共 20 个</p>
            </div>
            
            <!-- 单词展示 -->
            <div id="word-display" class="word-card text-center py-16 bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl mb-8">
                <h3 id="word-english" class="text-5xl font-bold text-gray-800 mb-8">Loading...</h3>
                <div id="word-chinese" class="text-3xl text-gray-600 mb-8 hidden">Loading...</div>
            </div>
            
            <!-- 按钮区域 -->
            <div id="button-area" class="flex justify-center space-x-6">
                <button id="known-btn" class="btn px-10 py-4 bg-green-500 text-white rounded-lg font-medium hover:bg-green-600 focus:ring-2 focus:ring-green-300">
                    认识
                </button>
                <button id="unknown-btn" class="btn px-10 py-4 bg-red-500 text-white rounded-lg font-medium hover:bg-red-600 focus:ring-2 focus:ring-red-300">
                    不认识
                </button>
            </div>
            
            <!-- 结果按钮 -->
            <div id="result-buttons" class="flex justify-center space-x-4 mt-8 hidden">
                <button id="next-btn" class="btn px-10 py-4 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 focus:ring-2 focus:ring-blue-300">
                    下一个
                </button>
            </div>
        </section>

        <!-- 单词列表界面 -->
        <section id="list-section" class="card bg-white rounded-xl shadow-md p-6 mb-8 hidden">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">单词列表</h2>
            <div id="word-list" class="space-y-3">
                <!-- 单词列表将通过JavaScript动态生成 -->
            </div>
            <div id="no-words" class="text-center py-12 text-gray-500">
                暂无单词，请先添加单词
            </div>
        </section>
    </main>

    <!-- 底部 -->
    <footer class="bg-gray-800 text-white py-4">
        <div class="container mx-auto px-4 text-center">
            <p>© 2026 单词记忆助手 - 为考研学习者设计</p>
        </div>
    </footer>

    <script>
        // 全局变量
        let words = JSON.parse(localStorage.getItem('words')) || [];
        let currentGroup = 0;
        let currentWordIndex = 0;
        let currentGroupWords = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 导航切换
            document.getElementById('nav-input').addEventListener('click', showInputSection);
            document.getElementById('nav-study').addEventListener('click', showStudySection);
            document.getElementById('nav-list').addEventListener('click', showListSection);

            // 表单提交
            document.getElementById('word-form').addEventListener('submit', function(e) {
                e.preventDefault();
                addWord();
            });

            // 学习按钮
            document.getElementById('known-btn').addEventListener('click', function() {
                showChineseMeaning();
            });
            document.getElementById('unknown-btn').addEventListener('click', function() {
                showChineseMeaning();
            });
            document.getElementById('next-btn').addEventListener('click', function() {
                nextWord();
            });

            // 初始显示输入界面
            showInputSection();
        });

        // 显示输入界面
        function showInputSection() {
            document.getElementById('input-section').classList.remove('hidden');
            document.getElementById('study-section').classList.add('hidden');
            document.getElementById('list-section').classList.add('hidden');
            updateNavigation('nav-input');
        }

        // 显示学习界面
        function showStudySection() {
            if (words.length === 0) {
                alert('请先添加单词');
                return;
            }
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('study-section').classList.remove('hidden');
            document.getElementById('list-section').classList.add('hidden');
            updateNavigation('nav-study');
            startStudy();
        }

        // 显示单词列表界面
        function showListSection() {
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('study-section').classList.add('hidden');
            document.getElementById('list-section').classList.remove('hidden');
            updateNavigation('nav-list');
            renderWordList();
        }

        // 更新导航状态
        function updateNavigation(activeId) {
            const navButtons = ['nav-input', 'nav-study', 'nav-list'];
            navButtons.forEach(id => {
                const button = document.getElementById(id);
                if (id === activeId) {
                    button.classList.remove('text-gray-900', 'bg-white', 'border', 'border-gray-200');
                    button.classList.add('text-white', 'bg-blue-600');
                } else {
                    button.classList.remove('text-white', 'bg-blue-600');
                    button.classList.add('text-gray-900', 'bg-white', 'border', 'border-gray-200');
                }
            });
        }

        // 添加单词
        function addWord() {
            const english = document.getElementById('english').value.trim();
            const chinese = document.getElementById('chinese').value.trim();

            if (english && chinese) {
                words.push({ english, chinese });
                localStorage.setItem('words', JSON.stringify(words));
                
                // 显示成功消息
                const message = document.getElementById('message');
                message.textContent = '单词添加成功！';
                message.classList.remove('hidden');
                
                // 清空表单
                document.getElementById('word-form').reset();
                
                // 3秒后隐藏消息
                setTimeout(() => {
                    message.classList.add('hidden');
                }, 3000);
            }
        }

        // 开始学习
        function startStudy() {
            // 分组单词，20个一组
            const groupSize = 20;
            const totalGroups = Math.ceil(words.length / groupSize);
            currentGroup = 0;
            currentWordIndex = 0;
            
            // 获取当前组的单词并随机排序
            let groupWords = words.slice(currentGroup * groupSize, (currentGroup + 1) * groupSize);
            // 随机排序算法
            currentGroupWords = groupWords.sort(() => Math.random() - 0.5);
            
            // 显示第一个单词
            showCurrentWord();
        }

        // 显示当前单词
        function showCurrentWord() {
            if (currentWordIndex < currentGroupWords.length) {
                const word = currentGroupWords[currentWordIndex];
                const wordDisplay = document.getElementById('word-display');
                
                // 添加动画效果
                wordDisplay.classList.remove('fade-in');
                void wordDisplay.offsetWidth; // 触发重排
                wordDisplay.classList.add('fade-in');
                
                document.getElementById('word-english').textContent = word.english;
                document.getElementById('word-chinese').textContent = word.chinese;
                document.getElementById('word-chinese').classList.add('hidden');
                document.getElementById('button-area').classList.remove('hidden');
                document.getElementById('result-buttons').classList.add('hidden');
                document.getElementById('word-count').textContent = `第 ${currentWordIndex + 1} 个 / 共 ${currentGroupWords.length} 个`;
            } else {
                alert('本组单词学习完成！');
                showInputSection();
            }
        }

        // 显示中文含义
        function showChineseMeaning() {
            document.getElementById('word-chinese').classList.remove('hidden');
            document.getElementById('button-area').classList.add('hidden');
            document.getElementById('result-buttons').classList.remove('hidden');
        }

        // 下一个单词
        function nextWord() {
            currentWordIndex++;
            showCurrentWord();
        }

        // 渲染单词列表
        function renderWordList() {
            const wordList = document.getElementById('word-list');
            const noWords = document.getElementById('no-words');
            
            if (words.length === 0) {
                wordList.innerHTML = '';
                noWords.classList.remove('hidden');
            } else {
                noWords.classList.add('hidden');
                wordList.innerHTML = '';
                
                words.forEach((word, index) => {
                    const wordItem = document.createElement('div');
                    wordItem.className = 'flex justify-between items-center p-3 border-b border-gray-200';
                    wordItem.innerHTML = `
                        <div>
                            <p class="font-medium text-gray-800">${word.english}</p>
                            <p class="text-gray-600">${word.chinese}</p>
                        </div>
                        <button class="text-red-500 hover:text-red-700" onclick="deleteWord(${index})">
                            删除
                        </button>
                    `;
                    wordList.appendChild(wordItem);
                });
            }
        }

        // 删除单词
        function deleteWord(index) {
            if (confirm('确定要删除这个单词吗？')) {
                words.splice(index, 1);
                localStorage.setItem('words', JSON.stringify(words));
                renderWordList();
            }
        }
    </script>
</body>
</html>
