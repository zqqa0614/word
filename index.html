<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词记忆助手 - 考研增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .card { transition: all 0.3s ease; border-radius: 16px; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .btn { transition: all 0.2s ease; border-radius: 12px; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); }
        .word-card.fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-btn.active { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-blue-600 text-white py-6 shadow-lg">
        <div class="container mx-auto px-4">
            <h1 class="text-3xl font-bold text-center">单词记忆助手</h1>
            <p class="text-center mt-2 opacity-90">离线存储 · 随时导出 · 备考无忧</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="flex justify-center mb-8">
            <div class="inline-flex rounded-lg shadow-sm bg-white p-1 border border-gray-200">
                <button id="nav-input" class="nav-btn px-6 py-2 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100">输入单词</button>
                <button id="nav-study" class="nav-btn px-6 py-2 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100">开始学习</button>
                <button id="nav-list" class="nav-btn px-6 py-2 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-100">单词列表</button>
            </div>
        </div>

        <section id="input-section" class="card bg-white p-6 mb-8 max-w-2xl mx-auto shadow-md">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">添加新单词</h2>
            <form id="word-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">英文</label>
                    <input type="text" id="english" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. Ambition" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">中文含义</label>
                    <input type="text" id="chinese" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 雄心，野心" required>
                </div>
                <button type="submit" class="btn w-full py-3 bg-blue-600 text-white font-bold hover:bg-blue-700">添加至词库</button>
            </form>
            <div id="message" class="mt-4 text-center text-green-600 font-medium hidden">✓ 已存入浏览器本地存储</div>
        </section>

        <section id="study-section" class="card bg-white p-8 mb-8 max-w-3xl mx-auto shadow-md hidden">
            <div class="text-center mb-8">
                <span id="word-count" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">1 / 20</span>
            </div>
            <div id="word-display" class="word-card text-center py-20 bg-gray-50 rounded-3xl mb-8 border-2 border-dashed border-gray-200">
                <h3 id="word-english" class="text-5xl font-bold text-gray-800 mb-6">Word</h3>
                <div id="word-chinese" class="text-3xl text-blue-600 font-medium hidden">中文含义</div>
            </div>
            <div id="button-area" class="flex justify-center space-x-4">
                <button id="show-btn" class="btn px-12 py-4 bg-gray-800 text-white font-bold hover:bg-black">查看释义</button>
            </div>
            <div id="result-buttons" class="flex justify-center space-x-4 hidden">
                <button id="next-btn" class="btn px-12 py-4 bg-blue-600 text-white font-bold hover:bg-blue-700">下一个</button>
            </div>
        </section>

        <section id="list-section" class="card bg-white p-6 mb-8 max-w-3xl mx-auto shadow-md hidden">
            <div class="flex flex-col sm:flex-row justify-between items-center mb-6 border-b pb-4 gap-4">
                <h2 class="text-2xl font-bold text-gray-800">词库管理</h2>
                <div class="flex space-x-2">
                    <button id="export-btn" class="btn px-4 py-2 bg-indigo-500 text-white text-sm hover:bg-indigo-600">导出备份</button>
                    <input type="file" id="import-input" class="hidden" accept=".json">
                    <button id="import-btn" class="btn px-4 py-2 bg-emerald-500 text-white text-sm hover:bg-emerald-600">导入备份</button>
                </div>
            </div>
            <div id="word-list" class="space-y-2 max-h-96 overflow-y-auto pr-2"></div>
            <div id="no-words" class="text-center py-12 text-gray-400">暂无数据</div>
        </section>
    </main>

    <footer class="text-gray-500 text-center py-8 text-sm">
        © 2027 考研单词助手 | 数据保存在您的当前浏览器中
    </footer>

    <script>
        let words = JSON.parse(localStorage.getItem('words')) || [];
        let currentWordIndex = 0;
        let studyList = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 路由导航
            document.getElementById('nav-input').onclick = () => switchTab('input');
            document.getElementById('nav-study').onclick = () => {
                if(words.length === 0) return alert('请先添加单词！');
                switchTab('study');
                startStudy();
            };
            document.getElementById('nav-list').onclick = () => {
                switchTab('list');
                renderList();
            };

            // 添加单词
            document.getElementById('word-form').onsubmit = (e) => {
                e.preventDefault();
                const en = document.getElementById('english');
                const zh = document.getElementById('chinese');
                words.push({ english: en.value.trim(), chinese: zh.value.trim() });
                saveData();
                en.value = ''; zh.value = '';
                const msg = document.getElementById('message');
                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 2000);
            };

            // 学习交互
            document.getElementById('show-btn').onclick = () => {
                document.getElementById('word-chinese').classList.remove('hidden');
                document.getElementById('button-area').classList.add('hidden');
                document.getElementById('result-buttons').classList.remove('hidden');
            };

            document.getElementById('next-btn').onclick = () => {
                currentWordIndex++;
                showWord();
            };

            // 导出功能
            document.getElementById('export-btn').onclick = () => {
                if(words.length === 0) return alert('词库是空的');
                const blob = new Blob([JSON.stringify(words, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `考研词库备份_${new Date().toLocaleDateString()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            // 导入功能
            const importBtn = document.getElementById('import-btn');
            const importInput = document.getElementById('import-input');
            importBtn.onclick = () => importInput.click();
            importInput.onchange = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if(Array.isArray(imported)) {
                            if(confirm(`识别到 ${imported.length} 个单词，是否覆盖当前词库？`)) {
                                words = imported;
                                saveData();
                                renderList();
                            }
                        }
                    } catch(err) { alert('文件格式不正确'); }
                };
                reader.readAsText(file);
            };

            switchTab('input');
        });

        function saveData() {
            localStorage.setItem('words', JSON.stringify(words));
        }

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tab}-section`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active');
        }

        function renderList() {
            const list = document.getElementById('word-list');
            const empty = document.getElementById('no-words');
            list.innerHTML = '';
            if(words.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            words.forEach((w, i) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-4 bg-gray-50 rounded-xl border border-gray-100';
                div.innerHTML = `
                    <div>
                        <div class="font-bold text-gray-800">${w.english}</div>
                        <div class="text-sm text-gray-500">${w.chinese}</div>
                    </div>
                    <button onclick="deleteWord(${i})" class="text-red-400 hover:text-red-600 px-2">删除</button>
                `;
                list.appendChild(div);
            });
        }

        function deleteWord(index) {
            if(confirm('删除后不可撤销，确定吗？')) {
                words.splice(index, 1);
                saveData();
                renderList();
            }
        }

        function startStudy() {
            studyList = [...words].sort(() => Math.random() - 0.5);
            currentWordIndex = 0;
            showWord();
        }

        function showWord() {
            if(currentWordIndex >= studyList.length) {
                alert('这一轮复习完啦！');
                switchTab('list');
                return;
            }
            const w = studyList[currentWordIndex];
            document.getElementById('word-count').textContent = `${currentWordIndex + 1} / ${studyList.length}`;
            document.getElementById('word-english').textContent = w.english;
            document.getElementById('word-chinese').textContent = w.chinese;
            document.getElementById('word-chinese').classList.add('hidden');
            document.getElementById('button-area').classList.remove('hidden');
            document.getElementById('result-buttons').classList.add('hidden');
            
            const display = document.getElementById('word-display');
            display.classList.remove('fade-in');
            void display.offsetWidth;
            display.classList.add('fade-in');
        }
    </script>
</body>
</html>
